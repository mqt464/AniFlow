services:
  aniflow-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      ANIFLOW_HOST: 0.0.0.0
      ANIFLOW_PORT: 8787
      ANIFLOW_FRONTEND_URL: ${ANIFLOW_FRONTEND_URL:-http://localhost:8080}
      ANIFLOW_DATA_DIR: /data
      ANIFLOW_DB_PATH: /data/aniflow.sqlite
    volumes:
      - aniflow-data:/data
    restart: unless-stopped

  aniflow-web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - aniflow-api
    ports:
      - '8080:80'
    restart: unless-stopped

volumes:
  aniflow-data:
